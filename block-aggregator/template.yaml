apiVersion: intropy.dev/v1
kind: Template
metadata:
  name: block-aggregator
  title: Aggregator Block
  description: .NET worker that subscribes to one or more system topics, aggregates or enriches the events, and publishes the result onto a new system topic. Declares its edge intent in the scaffold record so `intropy system create` can wire it into a SystemHost.
  tags:
    - dotnet
    - dapr
    - block
    - aggregator
  labels:
    intropy.dev/data-flow: internal
    intropy.dev/block-kind: aggregator

spec:
  parameters:
    type: object
    required:
      - name
      - subscribesTopics
      - publishesTopic
    properties:
      name:
        type: string
        title: Component name
        description: DNS-1123 name of the component. Becomes the folder name, csproj name, and Dapr app-id (e.g. order-aggregator).
        pattern: "^[a-z0-9]([-a-z0-9]{0,61}[a-z0-9])?$"
      subscribesTopics:
        type: string
        title: Subscribed topics
        description: Comma-separated DNS-1123 names of the system topics this aggregator subscribes to (e.g. order-raw,stock-raw).
      publishesPort:
        type: string
        title: Publish port
        description: Name of the aggregator's output port. Defaults to "out".
        default: ""
      publishesTopic:
        type: string
        title: Published topic
        description: DNS-1123 name of the system topic this aggregator publishes onto (e.g. order-fulfillment).
        pattern: "^[a-z0-9]([-a-z0-9]{0,61}[a-z0-9])?$"
      publishesContract:
        type: string
        title: Published contract
        description: PascalCase record name of the published payload. Defaults to PascalCase of the topic (order-fulfillment -> OrderFulfillment).
        default: ""
      consumesApis:
        type: string
        title: Consumed APIs
        description: Comma-separated DNS-1123 names of system APIs this component calls, if any.
        default: ""
  values:
    appId: '{{ .name }}'
    projectName: '{{ .name | replace "-" " " | title | replace " " "" }}'
