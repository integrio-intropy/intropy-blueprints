apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: business-incidents-internal-pubsub-subscription
spec:
  topic: business-incidents
  routes:
    rules:
      - match: event.type == "io.intropy.business_incident.create_or_update"
        path: /dequeue-create-or-update
      - match: event.type == "io.intropy.business_incident.resolve"
        path: /dequeue-resolve
      - match: event.type == "io.intropy.business_incident.set_maximum_retries_reached"
        path: /dequeue-set-max-retries-reached
    default: /dequeue-create-or-update
  pubsubname: business-incidents-internal
scopes:
  - business-incident-service
