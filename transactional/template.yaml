apiVersion: intropy.dev/v1
kind: Template
metadata:
  name: transactional
  title: Transactional Integration
  description: .NET job that polls a local source folder, publishes via in-memory Dapr pub/sub, and writes the transformed result to a local destination folder.
  tags:
    - example
    - dotnet
    - dapr
    - transactional
  labels:
    intropy.io/template-level: example

spec:
  parameters:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        title: Project name
        description: PascalCase identifier used for the .NET project, root namespace, and assembly. Dot-separated segments are allowed for nested namespaces (e.g. OrderSync or Int1055.OrderSync).
        pattern: "^[A-Z][A-Za-z0-9]*(\\.[A-Z][A-Za-z0-9]*)*$"
      empty:
        type: boolean
        title: Empty bodies
        description: When true, strip sample business logic from pipeline step bodies. The resulting project compiles and starts under Dapr, but every step throws NotImplementedException so a migration agent can fill them in.
        default: false
  values:
    appId: '{{ .name | kebabcase | replace "." "-" }}'
